name: Deploy CodeForge to ECS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY_API: codeforge-api
  ECR_REPOSITORY_WEB: codeforge-web
  ECR_REPOSITORY_WORKER: codeforge-worker
  CONTAINER_NAME_API: codeforge-api
  CONTAINER_NAME_WEB: codeforge-web
  CONTAINER_NAME_WORKER: codeforge-worker
  BENCHMARK_TREND_SUITE: all
  QUALITY_BENCHMARK_SUITE: swe-fixtures

jobs:
  api-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run API unit tests
        run: |
          set -euo pipefail
          pip install -r services/api/requirements.txt
          cd services/api
          pytest -q

  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        env:
          POSTGRES_PASSWORD: ci-test-password
          SUPABASE_JWT_SECRET: ci-test-jwt-secret
          RAZORPAY_KEY_ID: rzp_test_ci
          RAZORPAY_KEY_SECRET: ci_test_razorpay_secret
          CODEFORGE_ALLOW_DEV_LOGIN: "true"
        run: docker compose -f docker-compose.prod.yml up -d --build

      - name: API health check
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health > /tmp/api-health.json; then
              cat /tmp/api-health.json
              exit 0
            fi
            sleep 5
          done
          echo "API health check failed"
          docker compose -f docker-compose.prod.yml logs
          exit 1

      - name: Deploy readiness gate
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS http://127.0.0.1:8000/api/v1/platform/deploy-readiness >/tmp/deploy-readiness.json

          python - <<'PY'
          import json
          import sys

          payload = json.load(open('/tmp/deploy-readiness.json', encoding='utf-8'))
          if not payload.get('ready', False):
            failed = [c['name'] for c in payload.get('checks', []) if c.get('required', True) and not c.get('ok')]
            print('Deploy readiness failed:', ', '.join(failed) or 'unknown')
            sys.exit(1)
          print('Deploy readiness gate passed')
          PY

      - name: Billing webhook smoke gate
        shell: bash
        env:
          RAZORPAY_KEY_SECRET: ci_test_razorpay_secret
        run: |
          set -euo pipefail
          token=$(curl -fsS -X POST http://127.0.0.1:8000/api/v1/auth/dev-login \
            -H 'Content-Type: application/json' \
            -d '{"user_id":"billing-ci"}' | python -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          curl -fsS -X POST http://127.0.0.1:8000/api/v1/billing/create-order \
            -H "Authorization: Bearer $token" \
            -H 'Content-Type: application/json' \
            -d '{"plan_id":"pro","amount_inr":499,"currency":"INR"}' >/tmp/billing-order.json

          order_id=$(python -c "import json; print(json.load(open('/tmp/billing-order.json', encoding='utf-8'))['order_id'])")

          python - <<'PY'
          import hashlib
          import hmac
          import json
          import os
          import urllib.request

          order_id = json.load(open("/tmp/billing-order.json", encoding="utf-8"))["order_id"]
          event = {
              "event": "payment.captured",
              "payload": {
                  "payment": {"entity": {"id": "pay_ci_smoke", "order_id": order_id}},
                  "order": {
                      "entity": {
                          "id": order_id,
                          "notes": {
                              "plan_id": "pro",
                              "user_id": "billing-ci",
                              "amount_inr": "499",
                          },
                      }
                  },
              },
          }
          body = json.dumps(event).encode("utf-8")
          signature = hmac.new(
              os.environ["RAZORPAY_KEY_SECRET"].encode("utf-8"),
              body,
              hashlib.sha256,
          ).hexdigest()
          request = urllib.request.Request(
              "http://127.0.0.1:8000/api/v1/billing/webhook",
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "X-Razorpay-Signature": signature,
              },
              method="POST",
          )
          with urllib.request.urlopen(request) as response:
              payload = json.load(response)
          if payload.get("status") != "processed":
              raise SystemExit(f"Billing webhook smoke failed: {payload}")
          print("Billing webhook smoke gate passed")
          PY

      - name: Platform stack health gate
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS http://127.0.0.1:8000/api/v1/platform/stack-status >/tmp/stack-status.json

          python - <<'PY'
          import json
          import sys

          payload = json.load(open('/tmp/stack-status.json', encoding='utf-8'))
          issues = []

          if not payload.get('redis', {}).get('healthy', False):
            issues.append('redis unhealthy')
          if not payload.get('vector_store', {}).get('healthy', False):
            issues.append('vector_store unhealthy')
          if not payload.get('task_queue', {}).get('healthy', False):
            issues.append('task_queue unhealthy')

          # Treat fallback backends as degraded in CI release gates.
          if payload.get('redis', {}).get('backend') == 'memory':
            issues.append('redis backend degraded: memory')
          if payload.get('vector_store', {}).get('backend') == 'memory':
            issues.append('vector backend degraded: memory')
            if payload.get('vector_store', {}).get('embedding_source') != 'real':
              issues.append("vector embedding degraded: expected 'real'")
          if payload.get('task_queue', {}).get('backend') == 'inline':
            issues.append('task queue degraded: inline backend')
          if payload.get('generation', {}).get('backend') == 'deterministic':
            issues.append('generation backend degraded: deterministic')

          if issues:
            print('Stack-status degraded:', '; '.join(issues))
            sys.exit(1)

          print('Stack-status gate passed')
          PY

      - name: Queue ping health gate
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -X POST http://127.0.0.1:8000/api/v1/platform/queue-ping >/tmp/queue-ping.json

          python - <<'PY'
          import json
          import sys

          payload = json.load(open('/tmp/queue-ping.json', encoding='utf-8'))
          backend = payload.get('backend')
          status = payload.get('status')
          if backend != 'celery' or status != 'queued':
            print(f'Queue ping degraded: backend={backend} status={status}')
            sys.exit(1)
          print('Queue ping gate passed')
          PY

      - name: Worker consume health gate
        shell: bash
        run: |
          set -euo pipefail
          job_id="$(python - <<'PY'
          import json
          payload = json.load(open('/tmp/queue-ping.json', encoding='utf-8'))
          print(payload.get('job_id', ''))
          PY
          )"
          if [ -z "$job_id" ]; then
            echo "Queue ping did not return a job_id"
            exit 1
          fi

          for i in {1..30}; do
            curl -fsS "http://127.0.0.1:8000/api/v1/platform/queue-ping/${job_id}" >/tmp/queue-status.json
            python - <<'PY'
          import json
          import sys

          payload = json.load(open('/tmp/queue-status.json', encoding='utf-8'))
          status = str(payload.get('status', '')).lower()
          if status in {'success', 'ok'}:
              result = payload.get('result') or {}
              if result.get('status') == 'ok':
                  print('Worker consume gate passed')
                  sys.exit(0)
          if status in {'failure', 'failed', 'error'}:
              print(f"Worker job failed: {payload}")
              sys.exit(1)
          PY
            sleep 2
          done

          echo "Worker did not consume queue ping in time"
          docker compose -f docker-compose.prod.yml logs worker
          exit 1

      - name: Routing regression fail-closed gate
        shell: bash
        run: |
          set -euo pipefail
          token=$(curl -fsS -X POST http://127.0.0.1:8000/api/v1/auth/dev-login \
            -H 'Content-Type: application/json' \
            -d '{"user_id":"ci-bot"}' | python -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Ensure there is at least one benchmark run for trend evaluation.
          curl -fsS "http://127.0.0.1:8000/api/v1/evals/routing-benchmark?suite=${BENCHMARK_TREND_SUITE}" \
            -H "Authorization: Bearer $token" >/tmp/benchmark-run.json

          curl -fsS "http://127.0.0.1:8000/api/v1/evals/routing-benchmark/trends?suite=${BENCHMARK_TREND_SUITE}&limit=20" \
            -H "Authorization: Bearer $token" >/tmp/benchmark-trends.json

          python - <<'PY'
          import json
          import sys

          data = json.load(open("/tmp/benchmark-trends.json", encoding="utf-8"))
          alerts = int(data.get("regression_alerts_last_10", 0))
          if alerts > 0:
              runs = data.get("runs", [])
              flagged = [r.get("regression_reason", "regression detected") for r in runs if r.get("regression_alert")]
              print("Routing regression gate failed:", " | ".join(flagged[:3]))
              sys.exit(1)
          print("Routing regression gate passed")
          PY

      - name: Quality benchmark fail-closed gate
        shell: bash
        run: |
          set -euo pipefail
          token=$(curl -fsS -X POST http://127.0.0.1:8000/api/v1/auth/dev-login \
            -H 'Content-Type: application/json' \
            -d '{"user_id":"ci-bot"}' | python -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          curl -fsS "http://127.0.0.1:8000/api/v1/evals/quality-benchmark?suite=${QUALITY_BENCHMARK_SUITE}" \
            -H "Authorization: Bearer $token" >/tmp/quality-benchmark.json

          python - <<'PY'
          import json
          import sys

          payload = json.load(open("/tmp/quality-benchmark.json", encoding="utf-8"))
          pass_rate = float(payload.get("pass_rate", 0.0))
          if pass_rate < 1.0:
              failed = [item for item in payload.get("results", []) if not item.get("passed")]
              print("Quality benchmark failed:", failed)
              sys.exit(1)

          if payload.get("regression_alert"):
              print("Quality benchmark regression:", payload.get("regression_reason", "regression detected"))
              sys.exit(1)

          print(f"Quality benchmark gate passed ({pass_rate:.2f} pass rate)")
          PY

      - name: Web health check
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 > /tmp/web-health.html; then
              head -n 5 /tmp/web-health.html
              exit 0
            fi
            sleep 5
          done
          echo "Web health check failed"
          docker compose -f docker-compose.prod.yml logs
          exit 1

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v

  rollout-policy-gate:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
      CODEFORGE_SYNTHESIS_PROVIDER_STAGING: ${{ vars.CODEFORGE_SYNTHESIS_PROVIDER_STAGING }}
      CODEFORGE_SYNTHESIS_PROVIDER_PRODUCTION: ${{ vars.CODEFORGE_SYNTHESIS_PROVIDER_PRODUCTION }}
      SYNTHESIS_OPENAI_API_KEY_STAGING: ${{ secrets.SYNTHESIS_OPENAI_API_KEY_STAGING }}
      SYNTHESIS_AZURE_OPENAI_ENDPOINT_STAGING: ${{ secrets.SYNTHESIS_AZURE_OPENAI_ENDPOINT_STAGING }}
      SYNTHESIS_AZURE_OPENAI_API_KEY_STAGING: ${{ secrets.SYNTHESIS_AZURE_OPENAI_API_KEY_STAGING }}
      SYNTHESIS_AZURE_OPENAI_DEPLOYMENT_STAGING: ${{ secrets.SYNTHESIS_AZURE_OPENAI_DEPLOYMENT_STAGING }}
      SYNTHESIS_AZURE_OPENAI_ENDPOINT_PRODUCTION: ${{ secrets.SYNTHESIS_AZURE_OPENAI_ENDPOINT_PRODUCTION }}
      SYNTHESIS_AZURE_OPENAI_API_KEY_PRODUCTION: ${{ secrets.SYNTHESIS_AZURE_OPENAI_API_KEY_PRODUCTION }}
      SYNTHESIS_AZURE_OPENAI_DEPLOYMENT_PRODUCTION: ${{ secrets.SYNTHESIS_AZURE_OPENAI_DEPLOYMENT_PRODUCTION }}

    steps:
      - name: Validate synthesis rollout readiness gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$TARGET_ENV" == "production" ]]; then
            provider="${CODEFORGE_SYNTHESIS_PROVIDER_PRODUCTION:-}"
            if [[ -z "${SYNTHESIS_AZURE_OPENAI_ENDPOINT_PRODUCTION:-}" || -z "${SYNTHESIS_AZURE_OPENAI_API_KEY_PRODUCTION:-}" || -z "${SYNTHESIS_AZURE_OPENAI_DEPLOYMENT_PRODUCTION:-}" ]]; then
              echo "Production rollout gate failed: Azure OpenAI production credentials are incomplete."
              exit 1
            fi
            if [[ "$provider" != "azure_openai" ]]; then
              echo "Production rollout gate failed: CODEFORGE_SYNTHESIS_PROVIDER_PRODUCTION must be set to azure_openai."
              exit 1
            fi
            echo "Production rollout gate passed: azure_openai configured and policy-compliant."
            exit 0
          fi

          provider="${CODEFORGE_SYNTHESIS_PROVIDER_STAGING:-auto}"
          provider="$(echo "$provider" | tr '[:upper:]' '[:lower:]')"

          if [[ "$provider" != "auto" && "$provider" != "deterministic" && "$provider" != "openai" && "$provider" != "azure_openai" ]]; then
            echo "Staging rollout gate failed: CODEFORGE_SYNTHESIS_PROVIDER_STAGING must be one of auto, deterministic, openai, azure_openai."
            exit 1
          fi

          openai_ready=false
          azure_ready=false
          if [[ -n "${SYNTHESIS_OPENAI_API_KEY_STAGING:-}" ]]; then
            openai_ready=true
          fi
          if [[ -n "${SYNTHESIS_AZURE_OPENAI_ENDPOINT_STAGING:-}" && -n "${SYNTHESIS_AZURE_OPENAI_API_KEY_STAGING:-}" && -n "${SYNTHESIS_AZURE_OPENAI_DEPLOYMENT_STAGING:-}" ]]; then
            azure_ready=true
          fi

          if [[ "$openai_ready" == "false" && "$azure_ready" == "false" ]]; then
            if [[ "$provider" == "openai" || "$provider" == "azure_openai" ]]; then
              echo "Staging rollout gate failed: provider is $provider but corresponding staging credentials are not configured."
              exit 1
            fi

            echo "Staging rollout gate passed: no staging synthesis provider secrets found, using deterministic fallback policy."
            exit 0
          fi

          if [[ "$provider" == "openai" && "$openai_ready" == "false" ]]; then
            echo "Staging rollout gate failed: provider is openai but SYNTHESIS_OPENAI_API_KEY_STAGING is missing."
            exit 1
          fi

          if [[ "$provider" == "azure_openai" && "$azure_ready" == "false" ]]; then
            echo "Staging rollout gate failed: provider is azure_openai but Azure staging credentials are incomplete."
            exit 1
          fi

          echo "Staging rollout gate passed: synthesis provider policy is release-ready."

  deploy-staging:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    needs: [api-tests, smoke-test, rollout-policy-gate]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write

    env:
      ECS_CLUSTER: codeforge-staging
      ECS_SERVICE_API: codeforge-api-staging-service
      ECS_SERVICE_WEB: codeforge-web-staging-service
      ECS_SERVICE_WORKER: codeforge-worker-staging-service
      ECS_TASK_DEFINITION_API: infra/ecs/staging/taskdef-api.json
      ECS_TASK_DEFINITION_WEB: infra/ecs/staging/taskdef-web.json
      ECS_TASK_DEFINITION_WORKER: infra/ecs/staging/taskdef-worker.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        id: build-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG services/api
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Web image
        id: build-web
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG --build-arg NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE_STAGING }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Ensure worker ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY_WORKER" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY_WORKER"

      - name: Build and push Worker image
        id: build-worker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.worker -t $ECR_REGISTRY/$ECR_REPOSITORY_WORKER:$IMAGE_TAG services/api
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WORKER:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_WORKER:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Patch public URLs in ECS task definitions
        env:
          WEB_PUBLIC_URL: ${{ vars.WEB_PUBLIC_URL_STAGING }}
          API_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_API_BASE_STAGING }}
        run: |
          set -euo pipefail
          if [[ -z "${WEB_PUBLIC_URL}" || -z "${API_PUBLIC_URL}" ]]; then
            echo "Set WEB_PUBLIC_URL_STAGING and NEXT_PUBLIC_API_BASE_STAGING repository variables."
            exit 1
          fi
          python scripts/patch_ecs_public_urls.py \
            --environment staging \
            --web-url "${WEB_PUBLIC_URL}" \
            --api-url "${API_PUBLIC_URL}"

      - name: Render API task definition
        id: render-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION_API }}
          container-name: ${{ env.CONTAINER_NAME_API }}
          image: ${{ steps.build-api.outputs.image }}

      - name: Deploy API task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_API }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Render Web task definition
        id: render-web
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION_WEB }}
          container-name: ${{ env.CONTAINER_NAME_WEB }}
          image: ${{ steps.build-web.outputs.image }}

      - name: Deploy Web task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-web.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_WEB }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Patch worker task definition EFS filesystem id
        env:
          EFS_FILE_SYSTEM_ID: ${{ vars.EFS_FILE_SYSTEM_ID_STAGING }}
        run: |
          set -euo pipefail
          if [[ -z "${EFS_FILE_SYSTEM_ID}" || "${EFS_FILE_SYSTEM_ID}" == "fs-PLACEHOLDER" ]]; then
            echo "Set repository variable EFS_FILE_SYSTEM_ID_STAGING before deploying the worker service."
            exit 1
          fi
          python scripts/patch_ecs_worker_efs.py \
            --environment staging \
            --efs-file-system-id "${EFS_FILE_SYSTEM_ID}"

      - name: Render Worker task definition
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION_WORKER }}
          container-name: ${{ env.CONTAINER_NAME_WORKER }}
          image: ${{ steps.build-worker.outputs.image }}

      - name: Deploy Worker task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_WORKER }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Post-deploy public smoke checks
        env:
          API_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_API_BASE_STAGING }}
          WEB_PUBLIC_URL: ${{ vars.WEB_PUBLIC_URL_STAGING }}
        run: |
          set -euo pipefail
          bash scripts/post_deploy_public_smoke.sh "${API_PUBLIC_URL}" "${WEB_PUBLIC_URL}"

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    needs: [api-tests, smoke-test, rollout-policy-gate]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    env:
      ECS_CLUSTER: codeforge-prod
      ECS_SERVICE_API: codeforge-api-service
      ECS_SERVICE_WEB: codeforge-web-service
      ECS_SERVICE_WORKER: codeforge-worker-service
      ECS_TASK_DEFINITION_API: infra/ecs/production/taskdef-api.json
      ECS_TASK_DEFINITION_WEB: infra/ecs/production/taskdef-web.json
      ECS_TASK_DEFINITION_WORKER: infra/ecs/production/taskdef-worker.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        id: build-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG services/api
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Web image
        id: build-web
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG --build-arg NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE_PRODUCTION }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Ensure worker ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY_WORKER" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY_WORKER"

      - name: Build and push Worker image
        id: build-worker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.worker -t $ECR_REGISTRY/$ECR_REPOSITORY_WORKER:$IMAGE_TAG services/api
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WORKER:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_WORKER:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Patch public URLs in ECS task definitions
        env:
          WEB_PUBLIC_URL: ${{ vars.WEB_PUBLIC_URL_PRODUCTION }}
          API_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_API_BASE_PRODUCTION }}
        run: |
          set -euo pipefail
          if [[ -z "${WEB_PUBLIC_URL}" || -z "${API_PUBLIC_URL}" ]]; then
            echo "Set WEB_PUBLIC_URL_PRODUCTION and NEXT_PUBLIC_API_BASE_PRODUCTION repository variables."
            exit 1
          fi
          python scripts/patch_ecs_public_urls.py \
            --environment production \
            --web-url "${WEB_PUBLIC_URL}" \
            --api-url "${API_PUBLIC_URL}"

      - name: Render API task definition
        id: render-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION_API }}
          container-name: ${{ env.CONTAINER_NAME_API }}
          image: ${{ steps.build-api.outputs.image }}

      - name: Deploy API task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_API }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Render Web task definition
        id: render-web
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION_WEB }}
          container-name: ${{ env.CONTAINER_NAME_WEB }}
          image: ${{ steps.build-web.outputs.image }}

      - name: Deploy Web task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-web.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_WEB }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Patch worker task definition EFS filesystem id
        env:
          EFS_FILE_SYSTEM_ID: ${{ vars.EFS_FILE_SYSTEM_ID_PRODUCTION }}
        run: |
          set -euo pipefail
          if [[ -z "${EFS_FILE_SYSTEM_ID}" || "${EFS_FILE_SYSTEM_ID}" == "fs-PLACEHOLDER" ]]; then
            echo "Set repository variable EFS_FILE_SYSTEM_ID_PRODUCTION before deploying the worker service."
            exit 1
          fi
          python scripts/patch_ecs_worker_efs.py \
            --environment production \
            --efs-file-system-id "${EFS_FILE_SYSTEM_ID}"

      - name: Render Worker task definition
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION_WORKER }}
          container-name: ${{ env.CONTAINER_NAME_WORKER }}
          image: ${{ steps.build-worker.outputs.image }}

      - name: Deploy Worker task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_WORKER }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Post-deploy public smoke checks
        env:
          API_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_API_BASE_PRODUCTION }}
          WEB_PUBLIC_URL: ${{ vars.WEB_PUBLIC_URL_PRODUCTION }}
        run: |
          set -euo pipefail
          bash scripts/post_deploy_public_smoke.sh "${API_PUBLIC_URL}" "${WEB_PUBLIC_URL}"
