worker_processes auto;

events {
  worker_connections 1024;
}

http {
  upstream web_upstream {
    server web:3000;
  }

  upstream api_upstream {
    server api:8000;
  }

  server {
    listen 8080;
    server_name _;

    client_max_body_size 50m;

    location /health {
      proxy_pass http://api_upstream/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /ready {
      proxy_pass http://api_upstream/ready;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # Next.js BFF routes (session cookies, dev-login proxy) — must not hit FastAPI
    location /api/auth/ {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js server-side API proxy (when NEXT_PUBLIC_API_DIRECT=false)
    location /api/proxy/ {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    # FastAPI platform API
    location /api/v1/ {
      proxy_pass http://api_upstream/api/v1/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location / {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
