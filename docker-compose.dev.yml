# Local development stack: Postgres, Redis, Qdrant, API, worker, web, and gateway.
#
# Quick start (full microservices in Docker):
#   docker compose -f docker-compose.dev.yml up -d --build
#   open http://localhost:8080   # gateway (recommended)
#   open http://localhost:3000   # web direct
#   open http://localhost:8000   # API direct
#
# Host-only web dev (API in Docker):
#   npm run stack:up:backend && npm run dev:web:fresh
#
# Copy .env.example to .env and set POSTGRES_PASSWORD + SUPABASE_JWT_SECRET.

include:
  - docker-compose.microservices.yml

services:
  api:
    ports:
      - "8000:8000"
