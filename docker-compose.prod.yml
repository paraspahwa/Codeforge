services:

  db:

    image: postgres:16-alpine

    container_name: codeforge-db

    restart: unless-stopped

    environment:

      POSTGRES_DB: codeforge

      POSTGRES_USER: codeforge

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}

    volumes:

      - postgres_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U codeforge -d codeforge"]

      interval: 10s

      timeout: 5s

      retries: 5



  redis:

    image: redis:7-alpine

    container_name: codeforge-redis

    restart: unless-stopped

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 10s

      timeout: 5s

      retries: 5



  qdrant:

    image: qdrant/qdrant:v1.13.1

    container_name: codeforge-qdrant

    restart: unless-stopped

    ports:

      - "6333:6333"



  api:

    build:

      context: ./services/api

      dockerfile: Dockerfile

    container_name: codeforge-api

    restart: unless-stopped

    environment:

      PGHOST: db

      PGPORT: 5432

      PGUSER: codeforge

      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}

      PGDATABASE: codeforge

      REDIS_URL: redis://redis:6379/0

      CELERY_BROKER_URL: redis://redis:6379/1

      CELERY_RESULT_BACKEND: redis://redis:6379/1

      QDRANT_URL: http://qdrant:6333

      OTEL_SERVICE_NAME: codeforge-api

      OTEL_ENVIRONMENT: production

      CODEFORGE_ENV: production

      CODEFORGE_ALLOW_DEV_LOGIN: ${CODEFORGE_ALLOW_DEV_LOGIN:-false}

      CODEFORGE_COWORK_SCHEDULER_ENABLED: "false"

      CODEFORGE_CORS_ORIGINS: ${CODEFORGE_CORS_ORIGINS:-http://localhost:3000}

      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:?SUPABASE_JWT_SECRET must be set}

      CODEFORGE_OIDC_ENABLED: ${CODEFORGE_OIDC_ENABLED:-false}

      CODEFORGE_OIDC_ISSUER: ${CODEFORGE_OIDC_ISSUER:-}

      CODEFORGE_OIDC_AUDIENCE: ${CODEFORGE_OIDC_AUDIENCE:-}

      CODEFORGE_OIDC_JWKS_URI: ${CODEFORGE_OIDC_JWKS_URI:-}

      CODEFORGE_OIDC_CLIENT_ID: ${CODEFORGE_OIDC_CLIENT_ID:-}

      CODEFORGE_OIDC_CLIENT_SECRET: ${CODEFORGE_OIDC_CLIENT_SECRET:-}

      CODEFORGE_OIDC_REDIRECT_URI: ${CODEFORGE_OIDC_REDIRECT_URI:-}

      CODEFORGE_OIDC_TRUST_SUBJECT: ${CODEFORGE_OIDC_TRUST_SUBJECT:-false}

      CODEFORGE_OIDC_SCOPES: ${CODEFORGE_OIDC_SCOPES:-openid profile email}

      CODEFORGE_WEB_BASE_URL: ${CODEFORGE_WEB_BASE_URL:-http://localhost:3000}

      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}

      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}

      CODEFORGE_VISION_MODEL: ${CODEFORGE_VISION_MODEL:-gpt-4o-mini}

      CODEFORGE_API_BASE_URL: http://api:8000

      CODEFORGE_PUBLIC_API_BASE: ${CODEFORGE_PUBLIC_API_BASE:-http://localhost:8000}

      CODEFORGE_USER_ID: ${CODEFORGE_USER_ID:-dev-user}

      CODEFORGE_MODEL: ${CODEFORGE_MODEL:-deepseek-v4-flash}

      CODEFORGE_WORKSPACES_CONTAINER_PREFIX: /workspaces

      CODEFORGE_WORKSPACES_HOST_PREFIX: ${CODEFORGE_WORKSPACES_HOST_PREFIX:-}

    volumes:

      - ${CODEFORGE_HOST_WORKSPACES:-./workspaces}:/workspaces:rw

    depends_on:

      db:

        condition: service_healthy

      redis:

        condition: service_healthy

      qdrant:

        condition: service_started

    ports:

      - "8000:8000"



  worker:

    build:

      context: ./services/api

      dockerfile: Dockerfile.worker

    container_name: codeforge-worker

    restart: unless-stopped

    command: ["celery", "-A", "app.celery_worker:celery_app", "worker", "--beat", "--loglevel=info"]

    environment:

      PGHOST: db

      PGPORT: 5432

      PGUSER: codeforge

      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}

      PGDATABASE: codeforge

      REDIS_URL: redis://redis:6379/0

      CELERY_BROKER_URL: redis://redis:6379/1

      CELERY_RESULT_BACKEND: redis://redis:6379/1

      QDRANT_URL: http://qdrant:6333

      CODEFORGE_ENV: production

      OTEL_SERVICE_NAME: codeforge-worker

      CODEFORGE_DISABLE_PLAYWRIGHT: "false"

      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

      CODEFORGE_WORKSPACES_CONTAINER_PREFIX: /workspaces

      CODEFORGE_WORKSPACES_HOST_PREFIX: ${CODEFORGE_WORKSPACES_HOST_PREFIX:-}

    volumes:

      - ${CODEFORGE_HOST_WORKSPACES:-./workspaces}:/workspaces:rw

    depends_on:

      db:

        condition: service_healthy

      redis:

        condition: service_healthy

      qdrant:

        condition: service_started



  web:

    build:

      context: .

      dockerfile: apps/web/Dockerfile

      args:

        NEXT_PUBLIC_API_BASE: http://localhost:8000

    container_name: codeforge-web

    restart: unless-stopped

    depends_on:

      - api

    ports:

      - "3000:3000"



volumes:

  postgres_data:


